<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
	<defs>
		<!-- Broad soft tonal variation (cloudy patches, no grain feel) -->
		<filter id="clouds" x="0" y="0" width="100%" height="100%">
			<feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="3" seed="5" stitchTiles="stitch"/>
			<feColorMatrix values="0 0 0 0 0.28
			                       0 0 0 0 0.18
			                       0 0 0 0 0.08
			                       0 0 0 0.35 0"/>
		</filter>

		<!-- Sparse brown fiber specks, organic size -->
		<filter id="brownSpecks" x="0" y="0" width="100%" height="100%">
			<feTurbulence type="fractalNoise" baseFrequency="0.32" numOctaves="2" seed="3" stitchTiles="stitch"/>
			<feColorMatrix values="0 0 0 0 0.22
			                       0 0 0 0 0.13
			                       0 0 0 0 0.05
			                       3.0 0 0 0 -2.10"/>
		</filter>

		<!-- Sparse warm orange specks -->
		<filter id="orangeSpecks" x="0" y="0" width="100%" height="100%">
			<feTurbulence type="fractalNoise" baseFrequency="0.42" numOctaves="2" seed="11" stitchTiles="stitch"/>
			<feColorMatrix values="0 0 0 0 0.60
			                       0 0 0 0 0.30
			                       0 0 0 0 0.09
			                       3.0 0 0 0 -2.15"/>
		</filter>

		<!-- Rare darker flecks -->
		<filter id="darkFlecks" x="0" y="0" width="100%" height="100%">
			<feTurbulence type="fractalNoise" baseFrequency="0.52" numOctaves="1" seed="17" stitchTiles="stitch"/>
			<feColorMatrix values="0 0 0 0 0.10
			                       0 0 0 0 0.06
			                       0 0 0 0 0.03
			                       3.6 0 0 0 -2.65"/>
		</filter>
	</defs>

	<rect width="100%" height="100%" filter="url(#clouds)"/>
	<rect width="100%" height="100%" filter="url(#orangeSpecks)"/>
	<rect width="100%" height="100%" filter="url(#brownSpecks)"/>
	<rect width="100%" height="100%" filter="url(#darkFlecks)"/>
</svg>
